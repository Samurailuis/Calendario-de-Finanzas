// ─── GROQ CHAT ────────────────────────────────────────────────────────────────
const GROQ_KEY   = "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";
const CHAT_MDLS  = ["llama-3.1-8b-instant","llama3-8b-8192","gemma2-9b-it"];
const VIS_MDL    = "meta-llama/llama-4-scout-17b-16e-instruct";

const askGroq = async (msgs) => {
    let last = "";
    for (const model of CHAT_MDLS) {
        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY},
                body:JSON.stringify({model,messages:msgs,max_tokens:512,temperature:0.7})
            });
            if (r.ok) return (await r.json()).choices[0].message.content;
            const e = await r.json().catch(()=>({}));
            last = "["+model+"] HTTP "+r.status+": "+(e?.error?.message||"");
            if (r.status===401) break;
        } catch(e) { last = "["+model+"] "+e.message; }
    }
    throw new Error(last);
};

const askGroqVision = async (b64, mime, fname) => {
    const sys = `Eres un extractor de facturas. Responde SOLO con JSON válido sin backticks:
{"concepto":"descripción corta max 50 chars","fecha":"YYYY-MM-DD","monto":0.00}
Reglas: fecha ISO (si no hay usa hoy), monto es el total numérico.`;
    const isImg = mime && mime.startsWith("image/");
    const msgs = isImg
        ? [{ role:"system", content:sys },
           { role:"user", content:[
               { type:"image_url", image_url:{ url:"data:"+mime+";base64,"+b64 } },
               { type:"text", text:"Extrae concepto, fecha y monto total. Solo JSON." }
           ]}]
        : [{ role:"system", content:sys },
           { role:"user", content:"Archivo PDF: \""+( fname||"factura.pdf" )+"\". Devuelve JSON con concepto=nombre sin extensión, fecha=hoy, monto=0." }];
    const models = isImg ? [VIS_MDL,...CHAT_MDLS] : CHAT_MDLS;
    let last = "";
    for (const model of models) {
        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY},
                body:JSON.stringify({model,messages:msgs,max_tokens:256,temperature:0.1})
            });
            if (r.ok) {
                const raw = (await r.json()).choices[0].message.content
                    .trim().replace(/```json\n?/gi,"").replace(/```\n?/gi,"").trim();
                return JSON.parse(raw);
            }
            const e = await r.json().catch(()=>({}));
            last = "["+model+"] "+(e?.error?.message||r.status);
            if (r.status===401) break;
        } catch(e) { last = "["+model+"] "+e.message; }
    }
    throw new Error(last);
};

// ─── AUTH ─────────────────────────────────────────────────────────────────────
const AUTH_KEY="fp_auth_v2", SESSION_KEY="fp_session_v2";
const getAuthStore=()=>JSON.parse(localStorage.getItem(AUTH_KEY)||"{}");
const setAuthStore=s=>localStorage.setItem(AUTH_KEY,JSON.stringify(s));
const hashStr=s=>{let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(16).padStart(8,"0");};
const hashPass=p=>hashStr("fpro_salt_2025_"+p+"_secure");
const authRegister=(u,p)=>{const s=getAuthStore(),k=u.trim().toLowerCase();if(!u.trim()||!p)return{ok:false,msg:"Completa todos los campos."};if(u.trim().length<3)return{ok:false,msg:"El nombre debe tener al menos 3 caracteres."};if(p.length<6)return{ok:false,msg:"La contraseña debe tener al menos 6 caracteres."};if(s[k])return{ok:false,msg:"Ese nombre de usuario ya existe."};s[k]={displayName:u.trim(),hash:hashPass(p),createdAt:new Date().toISOString()};setAuthStore(s);return{ok:true};};
const authLogin=(u,p)=>{const s=getAuthStore(),k=u.trim().toLowerCase(),user=s[k];if(!user)return{ok:false,msg:"Usuario no encontrado."};if(user.hash!==hashPass(p))return{ok:false,msg:"Contraseña incorrecta."};return{ok:true,displayName:user.displayName};};
const authChangePassword=(u,old,np)=>{const s=getAuthStore(),k=u.trim().toLowerCase();if(!s[k])return{ok:false,msg:"Usuario no encontrado."};if(s[k].hash!==hashPass(old))return{ok:false,msg:"Contraseña actual incorrecta."};if(np.length<6)return{ok:false,msg:"La nueva contraseña debe tener al menos 6 caracteres."};s[k].hash=hashPass(np);setAuthStore(s);return{ok:true};};
const authChangeUsername=(old,p,nu)=>{const s=getAuthStore(),ok2=old.trim().toLowerCase(),nk=nu.trim().toLowerCase();if(!s[ok2])return{ok:false,msg:"Usuario no encontrado."};if(s[ok2].hash!==hashPass(p))return{ok:false,msg:"Contraseña incorrecta."};if(nu.trim().length<3)return{ok:false,msg:"El nombre debe tener al menos 3 caracteres."};if(s[nk]&&nk!==ok2)return{ok:false,msg:"Ese nombre ya está en uso."};["data","cats","dark","descs"].forEach(t=>{localStorage.setItem("fp_"+t+"_"+nk,localStorage.getItem("fp_"+t+"_"+ok2)||"");if(nk!==ok2)localStorage.removeItem("fp_"+t+"_"+ok2);});if(nk!==ok2){s[nk]={...s[ok2],displayName:nu.trim()};delete s[ok2];}else s[ok2].displayName=nu.trim();setAuthStore(s);return{ok:true,displayName:nu.trim(),newUsername:nk};};
const authDeleteAccount=(u,p)=>{const s=getAuthStore(),k=u.trim().toLowerCase();if(!s[k])return{ok:false,msg:"Usuario no encontrado."};if(s[k].hash!==hashPass(p))return{ok:false,msg:"Contraseña incorrecta."};delete s[k];setAuthStore(s);["data","cats","dark","descs"].forEach(t=>localStorage.removeItem("fp_"+t+"_"+k));return{ok:true};};

// ─── AUTH UI ──────────────────────────────────────────────────────────────────
const InputField = ({ label, icon, type="text", value, onChange, placeholder, error, autoFocus, onKeyDown }) => {
    const [show,setShow]=useState(false); const isPass=type==="password";
    return (
        <div className="space-y-1.5">
            {label&&<label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">{label}</label>}
            <div className={"relative flex items-center bg-white/5 border rounded-2xl transition-all duration-200 "+(error?"border-rose-500 shake":"border-white/10 focus-within:border-indigo-500")}>
                {icon&&<div className="absolute left-4 text-slate-400 pointer-events-none"><Icon name={icon} className="w-4 h-4"/></div>}
                <input type={isPass&&show?"text":type} value={value} onChange={onChange} placeholder={placeholder} autoFocus={autoFocus} onKeyDown={onKeyDown}
                    className={"w-full bg-transparent "+(icon?"pl-11":"pl-5")+" "+(isPass?"pr-11":"pr-5")+" py-3.5 text-sm text-white placeholder-white/25 outline-none auth-input rounded-2xl"}/>
                {isPass&&<button type="button" onClick={()=>setShow(s=>!s)} className="absolute right-4 text-slate-400 hover:text-white transition-colors"><Icon name={show?"eyeOff":"eye"} className="w-4 h-4"/></button>}
            </div>
            {error&&<p className="text-xs text-rose-400 ml-1 fade-in">{error}</p>}
        </div>
    );
};
const PasswordStrength = ({ password }) => {
    const score=useMemo(()=>{if(!password)return 0;let s=0;if(password.length>=6)s++;if(password.length>=10)s++;if(/[A-Z]/.test(password))s++;if(/[0-9]/.test(password))s++;if(/[^A-Za-z0-9]/.test(password))s++;return s;},[password]);
    if(!password)return null;
    const labels=["","Muy débil","Débil","Regular","Buena","Excelente"];
    const colors=["","bg-rose-500","bg-orange-500","bg-amber-400","bg-emerald-400","bg-emerald-500"];
    const tc=["","text-rose-400","text-orange-400","text-amber-400","text-emerald-400","text-emerald-500"];
    return <div className="space-y-1.5 fade-in"><div className="flex gap-1">{[1,2,3,4,5].map(i=><div key={i} className={"strength-bar flex-1 "+(i<=score?colors[score]:"bg-white/10")}/>)}</div><p className={"text-[10px] font-bold ml-1 transition-all "+tc[score]}>{labels[score]}</p></div>;
};

// ─── MINI CALENDAR ────────────────────────────────────────────────────────────
const MONTHS_ES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_ES=["Lu","Ma","Mi","Ju","Vi","Sá","Do"];
const MiniCalendar = ({ value, onChange, onClose }) => {
    const today=new Date();today.setHours(0,0,0,0);
    const parseVal=(v)=>v?new Date(v+"T00:00:00"):today;
    const selDate=parseVal(value);
    const [viewYear,setViewYear]=useState(selDate.getFullYear());
    const [viewMonth,setViewMonth]=useState(selDate.getMonth());
    const toStr=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const prev=()=>{if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);};
    const next=()=>{if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);};
    const firstDay=new Date(viewYear,viewMonth,1);
    const startDow=(firstDay.getDay()+6)%7;
    const dim=new Date(viewYear,viewMonth+1,0).getDate();
    const dip=new Date(viewYear,viewMonth,0).getDate();
    const cells=[];
    for(let i=startDow-1;i>=0;i--)cells.push({day:dip-i,month:"prev",date:new Date(viewYear,viewMonth-1,dip-i)});
    for(let d=1;d<=dim;d++)cells.push({day:d,month:"cur",date:new Date(viewYear,viewMonth,d)});
    const rem=42-cells.length;
    for(let d=1;d<=rem;d++)cells.push({day:d,month:"next",date:new Date(viewYear,viewMonth+1,d)});
    return (
        <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 rounded-3xl shadow-premium p-4 pop-in w-72 z-50" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-3">
                <button onClick={prev} className="p-1.5 hover:bg-slate-100 dark:hover:bg-white/5 rounded-xl transition-colors text-slate-500 dark:text-slate-400"><Icon name="chevL" className="w-4 h-4"/></button>
                <span className="text-sm font-black text-slate-800 dark:text-white">{MONTHS_ES[viewMonth]} {viewYear}</span>
                <button onClick={next} className="p-1.5 hover:bg-slate-100 dark:hover:bg-white/5 rounded-xl transition-colors text-slate-500 dark:text-slate-400"><Icon name="chevR" className="w-4 h-4"/></button>
            </div>
            <div className="grid grid-cols-7 mb-1">{DAYS_ES.map(d=><div key={d} className="text-center text-[9px] font-black uppercase text-slate-400 py-1">{d}</div>)}</div>
            <div className="grid grid-cols-7 gap-y-0.5">
                {cells.map((cell,i)=>{
                    const ds=toStr(cell.date);const isT=toStr(today)===ds;const isSel=value===ds;const isO=cell.month!=="cur";
                    return <div key={i} onClick={()=>{onChange(toStr(cell.date));onClose();}} className={"cal-day "+(isSel?"cal-selected":"")+" "+(isT&&!isSel?"cal-today":"")+" "+(isO?"cal-other-month":"")+" text-slate-700 dark:text-slate-200"}>{cell.day}</div>;
                })}
            </div>
            <div className="mt-3 pt-2.5 border-t border-slate-100 dark:border-white/5 text-center">
                <button onClick={()=>{onChange(toStr(today));onClose();}} className="text-[10px] font-bold text-indigo-500 hover:text-indigo-400 transition-colors">Ir a hoy</button>
            </div>
        </div>
    );
};
const DatePickerField = ({ value, onChange }) => {

    useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);

                                <input autoFocus value={newVal} onChange={e=>setNewVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handleAdd();if(e.key==="Escape"){setNewMode(false);setNewVal("");}}} placeholder="Nueva descripción…" className="flex-1 bg-slate-100 dark:bg-white/5 rounded-lg px-2 py-1.5 text-xs text-slate-800 dark:text-white outline-none border border-indigo-300 dark:border-indigo-500/50"/>
                                <button onClick={handleAdd} className="p-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 shrink-0"><Icon name="check" className="w-3 h-3"/></button>
                                <button onClick={()=>{setNewMode(false);setNewVal("");}} className="p-1.5 text-slate-400 hover:bg-slate-100 dark:hover:bg-white/5 rounded-lg shrink-0"><Icon name="x" className="w-3 h-3"/></button>
                            </div>
                        ):(
                            <button onClick={()=>setNewMode(true)} className="w-full flex items-center gap-2 px-4 py-2.5 text-xs font-bold text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 transition-colors">

};

// ─── AI SIDEBAR + INVOICE ANALYSIS ────────────────────────────────────────────
const AISidebar = ({ transactions, onAddTransaction }) => {
    const [messages,  setMessages]  = useState([]);
    const [input,     setInput]     = useState("");
    const [chatLoad,  setChatLoad]  = useState(false);
    // invoice state
    const [invFile,   setInvFile]   = useState(null);
    const [invB64,    setInvB64]    = useState(null);
    const [invMime,   setInvMime]   = useState(null);
    const [invPrev,   setInvPrev]   = useState(null);  // img preview data-url
    const [analyzing, setAnalyzing] = useState(false);
    const [extracted, setExtracted] = useState(null);  // true after analysis done
    const [extConcept,setExtConcept]= useState("");
    const [extDate,   setExtDate]   = useState("");
    const [extAmount, setExtAmount] = useState("");
    const [addOk,     setAddOk]     = useState(false);

    const scrollRef = useRef(null);
    const fileRef   = useRef(null);
    const dropRef   = useRef(null);

    useEffect(()=>{ scrollRef.current?.scrollIntoView({behavior:"smooth"}); },[messages,chatLoad,analyzing]);

    const todayISO=()=>{const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");};

    // ── Chat system prompt ──
    const buildSys=()=>{
        const inc=transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
        const exp=transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
        const top=transactions.filter(t=>t.type==="expense").reduce((acc,t)=>{acc[t.description]=(acc[t.description]||0)+t.amount;return acc;},{});
        const topList=Object.entries(top).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,v])=>k+": $"+v).join(", ");
        return "Eres FinanzaPro AI, asistente financiero en español. Sé conciso y empático. Datos: Ingresos $"+inc.toLocaleString()+", Gastos $"+exp.toLocaleString()+", Balance $"+(inc-exp).toLocaleString()+". Top gastos: "+(topList||"Sin datos")+". Transacciones: "+transactions.length+". Máximo 3 oraciones. Siempre en español.";
    };

    const handleSend=async()=>{
        const txt=input.trim()||"Dame un consejo financiero"; if(chatLoad)return;
        const nm=[...messages,{role:"user",text:txt}]; setMessages(nm); setInput(""); setChatLoad(true);
        try{const r=await askGroq([{role:"system",content:buildSys()},...nm.map(m=>({role:m.role==="ai"?"assistant":"user",content:m.text}))]);setMessages(p=>[...p,{role:"ai",text:r}]);}
        catch(e){setMessages(p=>[...p,{role:"ai",text:"⚠️ "+e.message}]);}
        finally{setChatLoad(false);}
    };

    // ── File processing ──
    const processFile=(file)=>{
        if(!file)return;
        setInvFile(file); setExtracted(null); setAddOk(false);
        setExtConcept(""); setExtDate(""); setExtAmount("");
        const isImg=file.type.startsWith("image/");
        const reader=new FileReader();
        reader.onload=(e)=>{
            const b64=e.target.result.split(",")[1];
            setInvB64(b64); setInvMime(file.type);
            if(isImg)setInvPrev(e.target.result); else setInvPrev(null);
        };
        reader.readAsDataURL(file);
    };

    const clearInvoice=()=>{
        setInvFile(null);setInvB64(null);setInvMime(null);setInvPrev(null);
        setExtracted(null);setAddOk(false);setExtConcept("");setExtDate("");setExtAmount("");
        if(fileRef.current)fileRef.current.value="";
    };

    // ── Drag & Drop ──
    const onDragOver=(e)=>{e.preventDefault();dropRef.current?.classList.add("drag-over");};
    const onDragLeave=()=>{dropRef.current?.classList.remove("drag-over");};
    const onDrop=(e)=>{e.preventDefault();dropRef.current?.classList.remove("drag-over");const f=e.dataTransfer.files[0];if(f)processFile(f);};

    // ── Analyze invoice ──
    const analyzeInvoice=async()=>{
        if(!invB64)return;
        setAnalyzing(true); setExtracted(null); setAddOk(false);
        try{
            const data=await askGroqVision(invB64,invMime,invFile?.name);
            const today=todayISO();
            const fecha=(!data.fecha||data.fecha==="YYYY-MM-DD")?today:data.fecha;
            setExtConcept(data.concepto||invFile?.name?.replace(/\.[^/.]+$/,"")||"Factura");
            setExtDate(fecha);
            setExtAmount(String(parseFloat(data.monto||0).toFixed(2)));
            setExtracted(true);
            setMessages(p=>[...p,{role:"ai",text:"📄 Factura analizada: \""+data.concepto+"\" — $"+parseFloat(data.monto||0).toFixed(2)+" del "+fecha.split("-").reverse().join("/")+". Revisa los datos y presiona \"Agregar al Panel\"."}]);
        }catch(e){
            const today=todayISO();
            setExtConcept(invFile?.name?.replace(/\.[^/.]+$/,"")||"Factura");
            setExtDate(today); setExtAmount("0.00"); setExtracted(true);
            setMessages(p=>[...p,{role:"ai",text:"⚠️ No pude leer la factura automáticamente ("+e.message+"). Completa los datos manualmente."}]);
        }finally{setAnalyzing(false);}
    };

    // ── Add to dashboard ──
    const handleAdd=()=>{
        if(!extConcept.trim()||!extDate||parseFloat(extAmount)<=0)return;
        onAddTransaction({type:"expense",amount:parseFloat(extAmount),description:extConcept.trim(),category:"General",date:extDate});
        setAddOk(true);
        setMessages(p=>[...p,{role:"ai",text:"✅ Movimiento \""+extConcept.trim()+"\" por $"+extAmount+" agregado al panel."}]);
        setTimeout(clearInvoice,1600);
    };

    const hasFile=!!invFile; const showExt=!!extracted;

    return (
        <Card className="h-full flex flex-col overflow-hidden bg-slate-900 border-none shadow-premium" noPadding>
            {/* ── Header ── */}
            <div className="p-4 border-b border-white/10 flex items-center gap-3 bg-white/5 backdrop-blur-xl relative overflow-hidden flex-shrink-0">
                <div className="absolute inset-0 opacity-5 pointer-events-none flex items-center justify-end pr-4"><Icon name="brain" className="w-20 h-20 text-indigo-300"/></div>
                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/40 animate-pulse"><Icon name="brain" className="text-white w-5 h-5"/></div>
                <div>
                    <h3 className="font-bold text-white text-sm">Analista IA</h3>
                    <span className="text-[9px] text-emerald-400 font-bold uppercase tracking-widest">Groq · LLaMA · Visión</span>
                </div>
            </div>

            {/* ── Messages ── */}
            <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar bg-slate-900/40 min-h-0">
                {messages.length===0
                    ?<div className="h-full flex flex-col items-center justify-center text-center opacity-30 px-4 space-y-3">
                        <Icon name="sparkles" className="w-10 h-10 text-indigo-400"/>
                        <p className="text-[10px] text-slate-300">Pregúntame sobre tus finanzas o adjunta una factura para analizarla automáticamente.</p>
                    </div>
                    :messages.map((m,i)=>(
                        <div key={i} className={"flex "+(m.role==="user"?"justify-end":"justify-start")+" fade-in"}>
                            <div className={"max-w-[85%] rounded-2xl p-3 text-[11px] leading-relaxed "+(m.role==="user"?"bg-indigo-600 text-white rounded-tr-none":"bg-slate-800 text-slate-200 border border-white/5 rounded-tl-none")}>{m.text}</div>
                        </div>
                    ))
                }
                {(chatLoad||analyzing)&&<div className="flex justify-start fade-in"><div className="bg-slate-800 border border-white/5 rounded-2xl rounded-tl-none p-3 flex items-center gap-1.5"><span className="typing-dot w-1.5 h-1.5 rounded-full bg-indigo-400 inline-block"/><span className="typing-dot w-1.5 h-1.5 rounded-full bg-indigo-400 inline-block"/><span className="typing-dot w-1.5 h-1.5 rounded-full bg-indigo-400 inline-block"/></div></div>}
                <div ref={scrollRef}/>
            </div>

            {/* ── Invoice drop zone (when no file) ── */}
            {!hasFile&&(
                <div className="px-3 pb-2 flex-shrink-0">
                    <div ref={dropRef} className="inv-drop flex items-center justify-center gap-2 py-2.5 px-3"
                        onClick={()=>fileRef.current?.click()}
                        onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}>
                        <Icon name="clip" className="w-3.5 h-3.5 text-indigo-400 shrink-0"/>
                        <span className="text-[10px] font-bold text-slate-500">Adjuntar factura o foto de recibo</span>
                        <span className="text-[9px] text-slate-600 ml-auto">JPG · PNG · PDF</span>
                    </div>
                </div>
            )}

            {/* ── Invoice panel (when file selected) ── */}
            {hasFile&&(
                <div className="border-t border-white/5 px-3 pt-3 pb-2 flex-shrink-0 space-y-2 bg-slate-900/60">
                    {/* File header row */}
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2 min-w-0">
                            <div className="w-5 h-5 bg-indigo-600/30 rounded-md flex items-center justify-center shrink-0">
                                <Icon name={invPrev?"zap":"fileText"} className="w-3 h-3 text-indigo-400"/>
                            </div>
                            <span className="text-[10px] font-semibold text-slate-300 truncate">{invFile.name}</span>
                        </div>
                        <button onClick={clearInvoice} className="text-slate-600 hover:text-rose-400 transition-colors p-1 rounded-lg hover:bg-rose-500/10 shrink-0 ml-2">
                            <Icon name="x" className="w-3.5 h-3.5"/>
                        </button>
                    </div>

                    {/* Image preview */}
                    {invPrev&&<img src={invPrev} alt="factura" className="inv-preview fade-in"/>}

                    {/* PDF chip */}
                    {!invPrev&&(
                        <div className="flex items-center gap-2 bg-white/5 rounded-xl px-3 py-2 border border-white/8">
                            <Icon name="fileText" className="w-4 h-4 text-indigo-400 shrink-0"/>
                            <span className="text-[11px] font-semibold text-slate-300 truncate flex-1">{invFile.name}</span>
                            <span className="text-[9px] font-bold text-slate-500 uppercase bg-white/5 px-1.5 py-0.5 rounded">PDF</span>
                        </div>
                    )}

                    {/* Analyze button */}
                    {!showExt&&(
                        <button onClick={analyzeInvoice} disabled={analyzing||!invB64}
                            className="w-full py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white text-[11px] font-black rounded-xl transition-all active:scale-95 flex items-center justify-center gap-1.5">
                            {analyzing
                                ?<><span className="typing-dot w-1.5 h-1.5 rounded-full bg-white inline-block"/><span className="typing-dot w-1.5 h-1.5 rounded-full bg-white inline-block"/><span className="typing-dot w-1.5 h-1.5 rounded-full bg-white inline-block"/></>
                                :<><Icon name="zap" className="w-3.5 h-3.5"/>Analizar con IA</>
                            }
                        </button>
                    )}

                    {/* Extracted form */}
                    {showExt&&!addOk&&(
                        <div className="space-y-2 fade-in">
                            <p className="text-[9px] font-black uppercase tracking-widest text-emerald-400 flex items-center gap-1.5">
                                <Icon name="check" className="w-3 h-3"/>Datos extraídos — edita si es necesario
                            </p>
                            <div className="space-y-1.5">
                                <div className="flex items-center gap-2">
                                    <span className="text-[9px] font-black text-slate-500 uppercase w-14 shrink-0">Concepto</span>
                                    <input value={extConcept} onChange={e=>setExtConcept(e.target.value)} className="ext-inp flex-1"/>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="text-[9px] font-black text-slate-500 uppercase w-14 shrink-0">Fecha</span>
                                    <input type="date" value={extDate} onChange={e=>setExtDate(e.target.value)} className="ext-inp flex-1"/>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="text-[9px] font-black text-slate-500 uppercase w-14 shrink-0">Monto $</span>
                                    <input type="number" step="0.01" min="0" value={extAmount} onChange={e=>setExtAmount(e.target.value)} className="ext-inp flex-1 text-emerald-300 font-black"/>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleAdd} disabled={!extConcept.trim()||parseFloat(extAmount)<=0}
                                    className="flex-1 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 text-white text-[11px] font-black rounded-xl transition-all active:scale-95 flex items-center justify-center gap-1.5">
                                    <Icon name="addFile" className="w-3.5 h-3.5"/>Agregar al Panel
                                </button>
                                <button onClick={()=>{setExtracted(null);setExtConcept("");setExtDate("");setExtAmount("");}}
                                    className="px-3 py-2 bg-white/5 hover:bg-white/10 text-slate-400 text-[11px] font-black rounded-xl transition-all border border-white/10" title="Volver a analizar">
                                    ↩
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Success banner */}
                    {addOk&&(
                        <div className="flex items-center justify-center gap-2 py-2 bg-emerald-500/15 rounded-xl border border-emerald-500/20 fade-in">
                            <Icon name="check" className="w-4 h-4 text-emerald-400"/>
                            <span className="text-[11px] font-bold text-emerald-300">¡Agregado al panel!</span>
                        </div>
                    )}
                </div>
            )}

            {/* ── Footer input bar ── */}
            <div className="p-3 bg-white/5 border-t border-white/10 flex gap-2 flex-shrink-0">
                <input type="file" ref={fileRef} accept="image/*,.pdf" className="hidden" onChange={e=>{if(e.target.files[0])processFile(e.target.files[0]);e.target.value="";}}/>
                <button onClick={()=>fileRef.current?.click()} title="Adjuntar factura"
                    className={"p-2 rounded-xl border transition-all shrink-0 "+(hasFile?"clip-active bg-indigo-600/30 border-indigo-500 text-indigo-300":"bg-white/5 border-white/10 text-slate-400 hover:text-indigo-300 hover:border-indigo-500/50")}>
                    <Icon name="clip" className="w-4 h-4"/>
                </button>
                <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSend()} placeholder="Pregunta algo sobre tus finanzas..." disabled={chatLoad}
                    className="flex-1 bg-black/20 border border-white/10 rounded-xl px-3 py-2 text-xs text-white outline-none focus:ring-1 focus:ring-indigo-500 placeholder-white/30 disabled:opacity-50 transition-all"/>
                <button onClick={handleSend} disabled={chatLoad} className="p-2 bg-indigo-600 text-white rounded-xl active:scale-90 transition-transform disabled:opacity-50 hover:bg-indigo-500 shrink-0">
                    <Icon name="send" className="w-4 h-4"/>
                </button>
            </div>
        </Card>
    );
};

// ─── CATEGORY PICKER ──────────────────────────────────────────────────────────
const CategoryPicker = ({ value, onChange, categories, onCategoriesChange }) => {
    const [open,setOpen]=useState(false);const [newMode,setNewMode]=useState(false);
    const [newVal,setNewVal]=useState("");const [delConfirm,setDelConfirm]=useState(null);
    const ref=useRef(null);
    const DEF=["Comida","Salario","Hogar","Transporte","Salud","Ocio","General"];
    useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target)){setOpen(false);setNewMode(false);setDelConfirm(null);}};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
    const handleAdd=()=>{const txt=newVal.trim();if(!txt||categories.some(c=>c.toLowerCase()===txt.toLowerCase()))return;const u=[...categories,txt];onCategoriesChange(u);onChange(txt);setNewVal("");setNewMode(false);setOpen(false);};
    const handleDel=(cat)=>{if(DEF.includes(cat))return;const u=categories.filter(c=>c!==cat);onCategoriesChange(u);if(value===cat)onChange(u[0]||"General");setDelConfirm(null);};
    return (
        <div ref={ref} className="relative">
            <button type="button" onClick={()=>setOpen(o=>!o)}
                className={"w-full flex items-center gap-3 bg-slate-50 dark:bg-slate-800/60 border "+(open?"border-indigo-500 ring-1 ring-indigo-500/30":"border-slate-200 dark:border-white/10")+" rounded-2xl px-4 py-3.5 text-sm transition-all"}>
                <Icon name="tag" className="w-4 h-4 text-indigo-500 shrink-0"/>
                <span className="flex-1 text-left font-semibold text-slate-800 dark:text-white truncate">{value}</span>
                <Icon name="chevD" className={"w-3.5 h-3.5 text-slate-400 transition-transform duration-200 "+(open?"rotate-180":"")}/>
            </button>
            {open&&(
                <div className="absolute top-full mt-2 left-0 right-0 bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 rounded-2xl shadow-premium z-50 overflow-hidden pop-in">
                    <div className="px-4 py-2.5 border-b border-slate-100 dark:border-white/5 flex items-center justify-between">
                        <span className="text-[10px] font-black uppercase tracking-wider text-slate-400">Categorías</span>
                        <span className="text-[9px] text-slate-400">{categories.length} total</span>
                    </div>
                    <div className="max-h-44 overflow-y-auto custom-scrollbar">
                        {categories.map((cat,i)=>(
                            <div key={i} className={"group flex items-center gap-2 px-3 py-2 transition-colors "+(value===cat?"bg-indigo-50 dark:bg-indigo-500/10":"hover:bg-slate-50 dark:hover:bg-white/5")}>
                                <button type="button" onClick={()=>{onChange(cat);setOpen(false);}} className="flex-1 text-left flex items-center gap-2.5">
                                    <div className={"w-2 h-2 rounded-full shrink-0 "+(value===cat?"bg-indigo-500":"bg-slate-300 dark:bg-slate-600")}/>
                                    <span className={"text-xs font-semibold "+(value===cat?"text-indigo-600 dark:text-indigo-400":"text-slate-700 dark:text-slate-200")}>{cat}</span>
                                    {DEF.includes(cat)&&<span className="text-[8px] font-bold text-slate-300 dark:text-slate-600 uppercase tracking-wide ml-auto pr-1">base</span>}
                                </button>
                                {!DEF.includes(cat)&&(delConfirm===cat?(
                                    <div className="flex items-center gap-1 shrink-0 fade-in">
                                        <span className="text-[9px] text-rose-500 font-bold">¿Eliminar?</span>
                                        <button type="button" onClick={()=>handleDel(cat)} className="p-1 bg-rose-500 text-white rounded-md hover:bg-rose-600"><Icon name="check" className="w-3 h-3"/></button>
                                        <button type="button" onClick={()=>setDelConfirm(null)} className="p-1 text-slate-400 hover:bg-slate-100 dark:hover:bg-white/5 rounded-md"><Icon name="x" className="w-3 h-3"/></button>
                                    </div>
                                ):(
                                    <button type="button" onClick={()=>setDelConfirm(cat)} className="p-1.5 opacity-0 group-hover:opacity-100 text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 rounded-lg transition-all shrink-0"><Icon name="trash" className="w-3 h-3"/></button>
                                ))}
                            </div>
                        ))}
                    </div>
                    <div className="border-t border-slate-100 dark:border-white/5">
                        {newMode?(
                            <div className="flex items-center gap-2 px-3 py-2.5">
                                <Icon name="plus" className="w-3.5 h-3.5 text-indigo-500 shrink-0"/>
                                <input autoFocus value={newVal} onChange={e=>setNewVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handleAdd();if(e.key==="Escape"){setNewMode(false);setNewVal("");}}} placeholder="Nombre de categoría…" className="flex-1 bg-slate-100 dark:bg-white/5 rounded-lg px-2 py-1.5 text-xs text-slate-800 dark:text-white outline-none border border-indigo-300 dark:border-indigo-500/50"/>
                                <button type="button" onClick={handleAdd} className="p-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 shrink-0"><Icon name="check" className="w-3 h-3"/></button>
                                <button type="button" onClick={()=>{setNewMode(false);setNewVal("");}} className="p-1.5 text-slate-400 hover:bg-slate-100 dark:hover:bg-white/5 rounded-lg shrink-0"><Icon name="x" className="w-3 h-3"/></button>
                            </div>
                        ):(
                            <button type="button" onClick={()=>setNewMode(true)} className="w-full flex items-center gap-2 px-4 py-2.5 text-xs font-bold text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 transition-colors">
                                <Icon name="plus" className="w-3.5 h-3.5"/>Nueva categoría
                            </button>
                        )}
                    </div>
                </div>
            )}
        </div>
    );
};

// ─── TRANSACTION MODAL ────────────────────────────────────────────────────────
const TransactionModal = ({ editing, categories, onCategoriesChange, savedDescs, onSavedDescsChange, onSave, onClose }) => {
    const today=new Date().toISOString().split("T")[0];
    const [type,    setType]    = useState(editing?.type     ||"expense");
    const [amount,  setAmount]  = useState(editing?.amount   ?String(editing.amount):"");
    const [desc,    setDesc]    = useState(editing?.description||"");
    const [category,setCategory]= useState(editing?.category ||"General");
    const [date,    setDate]    = useState(editing?.date     ||today);
    const handleSubmit=()=>{if(!amount||Number(amount)<=0||!desc.trim()||!date)return;onSave({id:editing?.id,type,amount:Number(amount),description:desc.trim(),category,date});};
    return (
        <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-xl z-[100] flex items-center justify-center p-4 fade-in text-slate-900 dark:text-white">
            <Card className="w-full max-w-lg relative scale-in shadow-premium border-none" noPadding>
                <div className="p-8">
                    <button onClick={onClose} className="absolute top-6 right-6 p-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-2xl transition-colors"><Icon name="x"/></button>
                    <h2 className="text-2xl font-black mb-7 flex items-center gap-4">
                        <div className="p-3 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl"><Icon name={editing?"edit":"plus"} className="w-6 h-6 text-indigo-600"/></div>
                        {editing?"Editar":"Añadir"} Registro
                    </h2>
                    <div className="space-y-5">
                        <div className="bg-slate-100 dark:bg-slate-800 p-1.5 rounded-2xl flex gap-1 shadow-inner">
                            {["expense","income"].map(tp=>(
                                <button key={tp} type="button" onClick={()=>setType(tp)}
                                    className={"flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all "+(type===tp?"bg-white dark:bg-slate-700 text-indigo-600 shadow-sm":"text-slate-500")}>
                                    {tp==="income"?"Ingreso":"Gasto"}
                                </button>
                            ))}
                        </div>
                        <div className="relative">
                            <span className="absolute left-6 top-1/2 -translate-y-1/2 text-2xl font-black text-slate-300 dark:text-slate-600 pointer-events-none">$</span>
                            <input type="number" step="0.01" min="0.01" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00" autoFocus
                                className="w-full bg-slate-50 dark:bg-slate-800/60 border-2 border-transparent focus:border-indigo-500 rounded-3xl pl-12 pr-6 py-5 text-4xl font-black outline-none transition-all dark:text-white"/>
                        </div>
                        <div className="space-y-1.5">
                            <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1 flex items-center gap-2">Descripción</label>
                            <DescriptionPicker value={desc} onChange={setDesc} savedDescs={savedDescs} onSavedDescsChange={onSavedDescsChange} transactionType={type}/>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="space-y-1.5">
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Categoría</label>
                                <CategoryPicker value={category} onChange={setCategory} categories={categories} onCategoriesChange={onCategoriesChange}/>
                            </div>
                            <div className="space-y-1.5">
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Fecha</label>
                                <DatePickerField value={date} onChange={setDate}/>
                            </div>
                        </div>
                    </div>
                    <button onClick={handleSubmit} disabled={!amount||Number(amount)<=0||!desc.trim()}
                        className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-base mt-6 shadow-xl shadow-indigo-600/30 active:scale-95 transition-all hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                        <Icon name={editing?"check":"plus"} className="w-5 h-5"/>Guardar Movimiento
                    </button>
                </div>
            </Card>
        </div>
    );
};

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
const Dashboard = ({ session, onLogout, onUpdateSession }) => {
    const { username, displayName } = session;
    const uk = username;
    const [darkMode,    setDarkMode]    = useState(()=>JSON.parse(localStorage.getItem("fp_dark_"+uk)||"false"));
    const [transactions,setTransactions]= useState(()=>JSON.parse(localStorage.getItem("fp_data_"+uk)||"[]"));
    const [categories,  setCategories]  = useState(()=>JSON.parse(localStorage.getItem("fp_cats_"+uk)||'["Comida","Salario","Hogar","Transporte","Salud","Ocio","General"]'));
    const [savedDescs,  setSavedDescs]  = useState(()=>JSON.parse(localStorage.getItem("fp_descs_"+uk)||"[]"));
    const [modalOpen,   setModalOpen]   = useState(false);
    const [editingTx,   setEditingTx]   = useState(null);
    const [activeModal, setActiveModal] = useState(null);

    useEffect(()=>{document.documentElement.classList.toggle("dark",darkMode);localStorage.setItem("fp_dark_"+uk,JSON.stringify(darkMode));},[darkMode,uk]);
    useEffect(()=>{localStorage.setItem("fp_data_"+uk,JSON.stringify(transactions));},[transactions,uk]);
    useEffect(()=>{localStorage.setItem("fp_cats_"+uk,JSON.stringify(categories));},[categories,uk]);
    useEffect(()=>{localStorage.setItem("fp_descs_"+uk,JSON.stringify(savedDescs));},[savedDescs,uk]);

    const stats=useMemo(()=>{
        const inc=transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
        const exp=transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
        const byCat=transactions.filter(t=>t.type==="expense").reduce((acc,t)=>{const n=(t.category||"General").trim();acc[n]=(acc[n]||0)+t.amount;return acc;},{});
        return{inc,exp,bal:inc-exp,cData:Object.entries(byCat).map(([name,value])=>({name,value}))};
    },[transactions]);

    const handleSave=(t)=>{
        if(t.id)setTransactions(p=>p.map(x=>x.id===t.id?t:x));
        else setTransactions(p=>[{...t,id:Date.now()},...p]);
        setModalOpen(false);setEditingTx(null);
    };

    // ── Called by AISidebar when invoice is added ──
    const handleAddFromInvoice=(t)=>{
        setTransactions(p=>[{...t,id:Date.now()},...p]);
    };

    const closeModal=()=>setActiveModal(null);

    return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-950 transition-colors duration-500 pb-20 text-slate-900 dark:text-white">
            {/* Navbar */}
            <nav className="h-16 bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl border-b border-slate-200 dark:border-white/5 sticky top-0 z-40 px-8 flex justify-between items-center">
                <div className="flex items-center gap-3">
                    <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><Icon name="wallet"/></div>
                    <span className="font-black text-xl tracking-tighter">Finanza<span className="text-indigo-600">Pro</span></span>
                </div>
                <div className="flex items-center gap-3">
                    <button onClick={()=>setDarkMode(d=>!d)} className="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-white/10 shadow-sm transition-transform active:scale-90">
                        {darkMode?<Icon name="sun" className="text-amber-400"/>:<Icon name="moon" className="text-indigo-600"/>}
                    </button>
                    <AccountMenu displayName={displayName} onLogout={onLogout}
                        onChangePass={()=>setActiveModal("changePass")}
                        onChangeUsername={()=>setActiveModal("changeUsername")}
                        onDeleteAccount={()=>setActiveModal("deleteAccount")}/>
                </div>
            </nav>

            <main className="max-w-[1600px] mx-auto px-8 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div className="lg:col-span-9 space-y-8">
                    {/* Header */}
                    <div className="flex justify-between items-end">
                        <div>
                            <h1 className="text-4xl font-black tracking-tight">Panel de {displayName}</h1>
                            <p className="text-slate-500 text-sm mt-1">Los cambios se sincronizan automáticamente.</p>
                        </div>
                        <button onClick={()=>{setEditingTx(null);setModalOpen(true);}}
                            className="px-4 py-2.5 bg-indigo-600 text-white rounded-2xl font-bold text-sm hover-lift shadow-lg shadow-indigo-600/30 active:scale-95 transition-all flex items-center gap-1.5">
                            <Icon name="plus" className="w-4 h-4"/><span>Nuevo Registro</span>
                        </button>
                    </div>

                    {/* Stats cards */}
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                        <Card className="hover-lift border-b-4 border-emerald-500 flex flex-col justify-between relative overflow-hidden">
                            <div className="absolute -right-3 -bottom-3 opacity-[0.06] pointer-events-none"><Icon name="up" className="w-24 h-24 text-emerald-600"/></div>
                            <div className="flex justify-between items-start"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ingresos</span><Icon name="up" className="w-5 h-5 text-emerald-500"/></div>
                            <p className="text-2xl font-black text-emerald-600 mt-2">${stats.inc.toLocaleString()}</p>
                        </Card>
                        <Card className="hover-lift border-b-4 border-rose-500 flex flex-col justify-between relative overflow-hidden">
                            <div className="absolute -right-3 -bottom-3 opacity-[0.06] pointer-events-none"><Icon name="down" className="w-24 h-24 text-rose-600"/></div>
                            <div className="flex justify-between items-start"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Gastos</span><Icon name="down" className="w-5 h-5 text-rose-500"/></div>
                            <p className="text-2xl font-black text-rose-600 mt-2">${stats.exp.toLocaleString()}</p>
                        </Card>
                        <Card className={"hover-lift border-0 bg-gradient-to-br "+(stats.bal>=0?"from-indigo-600 to-violet-700":"from-rose-600 to-orange-600")+" text-white shadow-2xl flex flex-col justify-between relative overflow-hidden"}>
                            <div className="absolute -right-4 -bottom-4 opacity-10 pointer-events-none"><Icon name="wallet" className="w-28 h-28 text-white"/></div>
                            <div className="flex justify-between items-start"><span className="text-[10px] font-bold opacity-70 uppercase tracking-widest">Balance</span><Icon name={stats.bal>=0?"up":"down"} className="w-5 h-5 opacity-80"/></div>
                            <p className="text-2xl font-black mt-2">${stats.bal.toLocaleString()}</p>
                        </Card>
                    </div>

                    {/* Charts */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <Card className="flex flex-col items-center justify-between min-h-[260px] relative overflow-hidden">
                            <div className="absolute -right-4 -top-4 opacity-[0.04] pointer-events-none"><Icon name="pieChart" className="w-28 h-28 text-indigo-600"/></div>
                            <h3 className="w-full font-bold text-[10px] uppercase tracking-widest text-slate-500 flex items-center gap-2"><Icon name="chart" className="w-3 h-3"/>Distribución</h3>
                            <SVGPieChart data={stats.cData}/>
                        </Card>
                        <Card className="flex flex-col justify-between min-h-[260px] relative overflow-hidden">
                            <div className="absolute -right-4 -top-4 opacity-[0.04] pointer-events-none"><Icon name="barChart" className="w-28 h-28 text-indigo-600"/></div>
                            <h3 className="font-bold text-[10px] uppercase tracking-widest text-slate-500 flex items-center gap-2"><Icon name="chart" className="w-3 h-3"/>Rendimiento</h3>
                            <SVGBarChart income={stats.inc} expense={stats.exp}/>
                        </Card>
                        <Card className="flex flex-col justify-between min-h-[260px] relative overflow-hidden">
                            <div className="absolute -right-4 -top-4 opacity-[0.04] pointer-events-none"><Icon name="calc" className="w-28 h-28 text-indigo-600"/></div>
                            <h3 className="font-bold text-[10px] uppercase tracking-widest text-slate-500 flex items-center gap-2"><Icon name="calc" className="w-3 h-3"/>Por Descripción</h3>
                            <DescriptionBarChart transactions={transactions}/>
                        </Card>
                    </div>

                    {/* Transactions table */}
                    <Card noPadding className="overflow-hidden shadow-soft relative">
                        <div className="absolute right-0 top-0 h-full flex items-center pr-8 opacity-[0.03] pointer-events-none"><Icon name="list" className="w-40 h-40 text-indigo-600"/></div>
                        <div className="p-6 border-b border-slate-100 dark:border-white/5 flex justify-between items-center bg-white/50 dark:bg-slate-900/50 backdrop-blur-xl">
                            <h3 className="font-bold text-sm text-slate-900 dark:text-white flex items-center gap-2"><Icon name="edit" className="w-4 h-4 text-indigo-500"/>Movimientos Recientes</h3>
                            {transactions.length>0&&<button onClick={()=>setTransactions([])} className="text-[10px] font-bold text-rose-500 hover:underline">Limpiar Todo</button>}
                        </div>
                        <div className="divide-y divide-slate-100 dark:divide-white/5 max-h-[400px] overflow-y-auto custom-scrollbar">
                            {transactions.length===0
                                ?<div className="p-20 text-center opacity-30 text-xs font-bold uppercase tracking-widest">Sin movimientos</div>
                                :transactions.map(t=>(
                                    <div key={t.id} className="p-5 flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-800/50 group transition-all fade-in">
                                        <div className="flex items-center gap-5">
                                            <div className={"w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm "+(t.type==="income"?"bg-emerald-50 text-emerald-600 dark:bg-emerald-500/10":"bg-rose-50 text-rose-600 dark:bg-rose-500/10")}>
                                                <Icon name={t.type==="income"?"up":"down"} className="w-6 h-6"/>
                                            </div>
                                            <div>
                                                <p className="font-bold text-xs capitalize text-slate-800 dark:text-slate-100 leading-tight">{t.description}</p>
                                                <span className="text-[9px] font-black uppercase text-slate-400 tracking-wider">{t.category} · {t.date?t.date.split("-").reverse().join("/"):""}</span>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-6">
                                            <span className={"text-sm font-black tabular-nums "+(t.type==="income"?"text-emerald-500":"text-slate-700 dark:text-slate-300")}>
                                                {t.type==="income"?"+":"-"}${t.amount.toLocaleString()}
                                            </span>
                                            <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                                <button onClick={()=>{setEditingTx(t);setModalOpen(true);}} className="p-1.5 text-slate-400 hover:text-indigo-500 transition-colors"><Icon name="edit" className="w-4 h-4"/></button>
                                                <button onClick={()=>setTransactions(p=>p.filter(x=>x.id!==t.id))} className="p-1.5 text-slate-400 hover:text-rose-500 transition-colors"><Icon name="trash" className="w-4 h-4"/></button>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            }
                        </div>
                    </Card>
                </div>

                {/* AI Sidebar */}
                <div className="lg:col-span-3 flex flex-col" style={{minHeight:"600px"}}>
                    <AISidebar transactions={transactions} onAddTransaction={handleAddFromInvoice}/>
                </div>
            </main>

            {/* Transaction Modal */}
            {modalOpen&&(
                <TransactionModal editing={editingTx} categories={categories} onCategoriesChange={setCategories}
                    savedDescs={savedDescs} onSavedDescsChange={setSavedDescs} onSave={handleSave}
                    onClose={()=>{setModalOpen(false);setEditingTx(null);}}/>
            )}

            {/* Account modals */}
            {activeModal==="changePass"&&<ChangePasswordModal username={username} onClose={closeModal}/>}
            {activeModal==="changeUsername"&&<ChangeUsernameModal username={username} displayName={displayName} onClose={closeModal} onChanged={(nu,nd)=>{closeModal();onUpdateSession({username:nu,displayName:nd});}}/>}
            {activeModal==="deleteAccount"&&<DeleteAccountModal username={username} onClose={closeModal} onDeleted={onLogout}/>}
        </div>
    );
};

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
    const [session,setSession]=useState(()=>{
        try{const raw=localStorage.getItem(SESSION_KEY);if(!raw)return null;const s=JSON.parse(raw);const store=getAuthStore();return store[s.username]?s:null;}catch{return null;}
    });
    const [screen,setScreen]=useState("login");
    const handleLogin=(s)=>{localStorage.setItem(SESSION_KEY,JSON.stringify(s));setSession(s);};
    const handleLogout=()=>{localStorage.removeItem(SESSION_KEY);setSession(null);setScreen("login");document.documentElement.classList.remove("dark");};
    const handleUpdate=(s)=>{localStorage.setItem(SESSION_KEY,JSON.stringify(s));setSession(s);};
    if(session)return <Dashboard session={session} onLogout={handleLogout} onUpdateSession={handleUpdate}/>;
    if(screen==="register")return <RegisterScreen onGoLogin={()=>setScreen("login")} onRegisterSuccess={u=>{const s=getAuthStore(),k=u.trim().toLowerCase();handleLogin({username:k,displayName:s[k]?.displayName||u});}}/>;
    return <LoginScreen onLogin={handleLogin} onGoRegister={()=>setScreen("register")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
